proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🇰🇷 韩国节点
      - 🌐 其他国家
      - 🚀 手动切换
      - DIRECT
  - name: 🚀 手动切换
    include-all: true
    type: select
  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|剩余|套餐|官网|\*[3-9]\.[1-9]\d*$|\*[4-9](?:\.\d+)?$|\*[1-9]\d+(?:\.\d+)?$
    interval: 300
    tolerance: 50
  - name: 📲 电报消息
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🇰🇷 韩国节点
      - 🌐 其他国家
      - 🚀 手动切换
      - DIRECT
  - name: 🤖 AI
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🇰🇷 韩国节点
      - 🌐 其他国家
      - 🚀 手动切换
      - DIRECT
  - name: 🌍 国外媒体
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🇰🇷 韩国节点
      - 🌐 其他国家
      - 🚀 手动切换
      - DIRECT
  - name: 📢 谷歌FCM
    hidden: true
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - 🇺🇸 美国节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🌐 其他国家
      - 🚀 手动切换
  - name: 🍎 苹果服务
    hidden: true
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - 🇺🇸 美国节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🌐 其他国家
      - 🚀 手动切换
  - name: 🎯 全球直连
    hidden: true
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - ♻️ 自动选择
  - name: 🛑 广告拦截
    hidden: true
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: 🍃 应用净化
    hidden: true
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - DIRECT
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🇰🇷 韩国节点
      - 🌐 其他国家
      - 🚀 手动切换
  - name: 🇭🇰 香港节点
    hidden: true
    include-all: true
    filter: (?i)港|HK|hk|Hong Kong|HongKong|hongkong
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|剩余|套餐|官网|\*[3-9]\.[1-9]\d*$|\*[4-9](?:\.\d+)?$|\*[1-9]\d+(?:\.\d+)?$
    type: url-test
    interval: 300
    tolerance: 50
  - name: 🇯🇵 日本节点
    hidden: true
    include-all: true
    filter: (?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|剩余|套餐|官网|\*[3-9]\.[1-9]\d*$|\*[4-9](?:\.\d+)?$|\*[1-9]\d+(?:\.\d+)?$
    type: url-test
    interval: 300
    tolerance: 50
  - name: 🇺🇸 美国节点
    hidden: true
    include-all: true
    filter: (?i)美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|剩余|套餐|官网|\*[3-9]\.[1-9]\d*$|\*[4-9](?:\.\d+)?$|\*[1-9]\d+(?:\.\d+)?$
    type: url-test
    interval: 300
    tolerance: 50
  - name: 🇨🇳 台湾节点
    hidden: true
    include-all: true
    filter: (?i)台|新北|彰化|TW|Taiwan
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|剩余|套餐|官网|\*[3-9]\.[1-9]\d*$|\*[4-9](?:\.\d+)?$|\*[1-9]\d+(?:\.\d+)?$
    type: url-test
    interval: 300
    tolerance: 50
  - name: 🇸🇬 狮城节点
    hidden: true
    include-all: true
    filter: (?i)新加坡|坡|狮城|SG|Singapore
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|剩余|套餐|官网|\*[3-9]\.[1-9]\d*$|\*[4-9](?:\.\d+)?$|\*[1-9]\d+(?:\.\d+)?$
    type: url-test
    interval: 300
    tolerance: 50
  - name: 🇰🇷 韩国节点
    hidden: true
    include-all: true
    filter: (?i)KR|Korea|KOR|首尔|韩|韓
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|剩余|套餐|官网|\*[3-9]\.[1-9]\d*$|\*[4-9](?:\.\d+)?$|\*[1-9]\d+(?:\.\d+)?$
    type: url-test
    interval: 300
    tolerance: 50
  - name: 🌐 其他国家
    hidden: true
    include-all: true
    filter: (?i)英|UK|伦敦|德|DE|法兰克福|法|FR|巴黎|加|CA|多伦多|温哥华|澳|AU|悉尼|墨尔本|荷|NL|阿姆斯特丹|印|IN|印度|俄|RU|莫斯科|泰|TH|越南|VN|马来|MY|吉隆坡|菲|PH|印尼|ID|土|TR|土耳其|巴|BR|巴西|墨|MX|墨西哥|London|Germany|France|Canada|Australia|Netherlands|Russia|Thailand|Vietnam|Malaysia|Philippines|Indonesia|Turkey|Brazil|Mexico
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|剩余|套餐|官网|\*[3-9]\.[1-9]\d*$|\*[4-9](?:\.\d+)?$|\*[1-9]\d+(?:\.\d+)?$
    type: select
